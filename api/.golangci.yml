version: "2"

linters:
  default: standard
  enable:
    - depguard
    - misspell
    - revive
    - unconvert
  settings:
    # オニオンアーキテクチャ（ADR 0004）の依存方向を強制する。各層から「外向き」の
    # import を禁じ、内向き一方向だけを許す。di は合成ルートのためルールを置かない。
    depguard:
      rules:
        domain:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: "github.com/HMasataka/beyond/internal/usecase"
              desc: "domain は中心。外側の層に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/repository"
              desc: "domain は中心。外側の層に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/handler"
              desc: "domain は中心。外側の層に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/infra"
              desc: "domain は中心。技術詳細に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/openapi"
              desc: "domain は中心。生成物に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/di"
              desc: "domain は合成ルートに依存しない"
        usecase:
          files:
            - "**/internal/usecase/**"
          deny:
            - pkg: "github.com/HMasataka/beyond/internal/repository"
              desc: "usecase は domain にのみ依存する"
            - pkg: "github.com/HMasataka/beyond/internal/handler"
              desc: "usecase は domain にのみ依存する"
            - pkg: "github.com/HMasataka/beyond/internal/infra"
              desc: "usecase は domain にのみ依存する"
            - pkg: "github.com/HMasataka/beyond/internal/openapi"
              desc: "usecase は domain にのみ依存する"
            - pkg: "github.com/HMasataka/beyond/internal/di"
              desc: "usecase は合成ルートに依存しない"
        handler:
          files:
            - "**/internal/handler/**"
          deny:
            - pkg: "github.com/HMasataka/beyond/internal/repository"
              desc: "handler は usecase 経由で業務を呼ぶ。永続化に直接依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/infra"
              desc: "handler は技術詳細に直接依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/di"
              desc: "handler は合成ルートに依存しない"
        repository:
          files:
            - "**/internal/repository/**"
          deny:
            - pkg: "github.com/HMasataka/beyond/internal/usecase"
              desc: "repository は domain のインターフェースを実装する。上位層に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/handler"
              desc: "repository は上位層に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/openapi"
              desc: "repository は生成物に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/di"
              desc: "repository は合成ルートに依存しない"
        infra:
          files:
            - "**/internal/infra/**"
          deny:
            - pkg: "github.com/HMasataka/beyond/internal/domain"
              desc: "infra は技術詳細の葉。業務層を知らない"
            - pkg: "github.com/HMasataka/beyond/internal/usecase"
              desc: "infra は技術詳細の葉。業務層を知らない"
            - pkg: "github.com/HMasataka/beyond/internal/repository"
              desc: "infra は技術詳細の葉。業務層を知らない"
            - pkg: "github.com/HMasataka/beyond/internal/handler"
              desc: "infra は技術詳細の葉。業務層を知らない"
            - pkg: "github.com/HMasataka/beyond/internal/openapi"
              desc: "infra は生成物に依存しない"
            - pkg: "github.com/HMasataka/beyond/internal/di"
              desc: "infra は合成ルートに依存しない"
    revive:
      # golint 相当のデフォルト規則から package-comments のみ除いた明示列挙。
      # rules を指定するとデフォルトは引き継がれないため、欲しい規則を列挙する。
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

formatters:
  enable:
    - gofmt
    - goimports
