version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
    - unconvert
  settings:
    revive:
      # golint 相当のデフォルト規則から package-comments のみ除いた明示列挙。
      # rules を指定するとデフォルトは引き継がれないため、欲しい規則を列挙する。
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

formatters:
  enable:
    - gofmt
    - goimports
