version: "3"

vars:
  API_DIR: api
  WEB_DIR: web

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  gen:
    desc: Generate code from OpenAPI spec (Go + TS)
    cmds:
      - task: gen:api
      - task: gen:web

  gen:api:
    desc: Generate Go types and chi server from OpenAPI
    dir: "{{.API_DIR}}"
    cmds:
      - go generate ./...

  gen:web:
    desc: Generate TypeScript types from OpenAPI
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm gen:api

  lint:
    desc: Run all linters (Go + web)
    cmds:
      - task: lint:api
      - task: lint:web

  lint:api:
    desc: Run Go linters
    dir: "{{.API_DIR}}"
    cmds:
      - go vet ./...
      - golangci-lint run ./...

  lint:web:
    desc: Lint and format-check web with Biome
    dir: "{{.WEB_DIR}}"
    cmds:
      - biome check .

  dev:api:
    desc: Run the API server
    dir: "{{.API_DIR}}"
    cmds:
      - go run ./cmd/main

  build:api:
    desc: Build the API binary
    dir: "{{.API_DIR}}"
    cmds:
      - go build -o bin/api ./cmd/main

  dev:web:
    desc: Run Vite dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm dev

  build:web:
    desc: Build web production bundle
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm build

  compose:up:
    desc: Start containers
    cmds:
      - docker compose up -d
      - docker compose ps

  compose:down:
    desc: Stop and remove containers (preserve volumes)
    cmds:
      - docker compose down

  compose:reset:
    desc: Stop containers and delete volumes
    cmds:
      - docker compose down -v

  compose:logs:
    desc: Tail compose logs
    cmds:
      - docker compose logs -f
