version: "3"

vars:
  API_DIR: api
  WEB_DIR: web

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  gen:
    desc: Generate code from OpenAPI spec (Go + TS)
    cmds:
      - task: gen:api
      - task: gen:web

  gen:api:
    desc: Generate Go types and chi server from OpenAPI
    dir: "{{.API_DIR}}"
    cmds:
      - go generate ./...

  gen:web:
    desc: Generate TypeScript types from OpenAPI
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm gen:api

  lint:
    desc: Run all linters (Go + web + Markdown)
    cmds:
      - task: lint:api
      - task: lint:web
      - task: lint:arch
      - task: lint:md

  lint:md:
    desc: Lint Markdown with markdownlint-cli2
    cmds:
      - markdownlint-cli2 "**/*.md"

  lint:api:
    desc: Run Go linters
    dir: "{{.API_DIR}}"
    cmds:
      - go vet ./...
      - golangci-lint run ./...

  lint:web:
    desc: Lint and format-check web with Biome and rustywind
    dir: "{{.WEB_DIR}}"
    cmds:
      - biome check .
      - rustywind --check-formatted src

  lint:arch:
    desc: Enforce web import boundaries with dependency-cruiser (needs node_modules)
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm depcruise

  test:
    desc: Run all tests (Go + web)
    cmds:
      - task: test:api
      - task: test:web

  test:api:
    desc: Run Go tests
    dir: "{{.API_DIR}}"
    cmds:
      - go test ./...

  test:web:
    desc: Run web tests
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm test

  dev:
    desc: Run API and web dev servers concurrently
    deps:
      - dev:api
      - dev:web

  dev:api:
    desc: Run the API server with live reload
    dir: "{{.API_DIR}}"
    dotenv:
      - ".env"
    cmds:
      - air

  migrate:up:
    desc: Apply all pending migrations
    dir: "{{.API_DIR}}"
    dotenv:
      - ".env"
    env:
      GOOSE_DRIVER: mysql
      GOOSE_MIGRATION_DIR: internal/migrations
    cmds:
      - GOOSE_DBSTRING="$DB_DSN" goose up

  migrate:down:
    desc: Roll back the most recent migration
    dir: "{{.API_DIR}}"
    dotenv:
      - ".env"
    env:
      GOOSE_DRIVER: mysql
      GOOSE_MIGRATION_DIR: internal/migrations
    cmds:
      - GOOSE_DBSTRING="$DB_DSN" goose down

  migrate:status:
    desc: Show migration status
    dir: "{{.API_DIR}}"
    dotenv:
      - ".env"
    env:
      GOOSE_DRIVER: mysql
      GOOSE_MIGRATION_DIR: internal/migrations
    cmds:
      - GOOSE_DBSTRING="$DB_DSN" goose status

  migrate:create:
    desc: Create a new SQL migration (NAME=migration_name)
    dir: "{{.API_DIR}}"
    env:
      GOOSE_MIGRATION_DIR: internal/migrations
    requires:
      vars:
        - NAME
    cmds:
      - goose -s create {{.NAME}} sql

  build:api:
    desc: Build the API binary
    dir: "{{.API_DIR}}"
    cmds:
      - go build -o bin/api ./cmd/main

  dev:web:
    desc: Run Vite dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm dev

  build:web:
    desc: Build web production bundle
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm build

  compose:up:
    desc: Start containers
    cmds:
      - docker compose up -d
      - docker compose ps

  compose:down:
    desc: Stop and remove containers (preserve volumes)
    cmds:
      - docker compose down

  compose:reset:
    desc: Stop containers and delete volumes
    cmds:
      - docker compose down -v

  compose:logs:
    desc: Tail compose logs
    cmds:
      - docker compose logs -f
