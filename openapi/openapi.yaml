openapi: 3.0.3
info:
  title: Beyond API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: ヘルスチェック
      operationId: getHealthz
      responses:
        "200":
          description: サービスは正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readyz:
    get:
      summary: レディネスチェック
      operationId: getReadyz
      responses:
        "200":
          description: 依存先（DB）に到達でき、リクエストを受け付けられる
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: 依存先（DB）に到達できず、リクエストを受け付けられない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
components:
  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
          example: ok
    ReadinessStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable
          example: ok
